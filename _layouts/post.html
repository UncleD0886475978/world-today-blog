<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{ page.title }} | The World Today</title>
<meta name="description" content="{{ page.description | default: site.description }}">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,serif;max-width:800px;margin:40px auto;padding:0 20px;line-height:1.8;color:#222;background:#f4f1eb}
a.back{display:inline-block;margin-bottom:24px;color:#c0392b;font-size:0.85rem;font-family:sans-serif;text-decoration:none;border-bottom:1px solid #c0392b}
.cat{background:#c0392b;color:#fff;font-size:0.65rem;font-weight:700;padding:3px 10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;display:inline-block}
h1{font-size:2rem;line-height:1.2;margin:12px 0}
.meta{color:#888;font-size:0.82rem;margin:12px 0 24px;font-family:sans-serif}
.lead{font-size:1.05rem;color:#555;font-style:italic;border-left:3px solid #c0392b;padding-left:16px;margin-bottom:24px}
hr{border:none;border-top:1px solid #ddd;margin:24px 0}
h2{font-size:1.25rem;margin:2rem 0 0.75rem;border-left:3px solid #c0392b;padding-left:10px}
p{margin-bottom:1.2rem}
</style>
</head>
<body>
<a class="back" href="{{ site.baseurl }}/">&larr; The World Today</a>
<div><span class="cat">{{ page.categories[0] }}</span></div>
<h1>{{ page.title }}</h1>
<div class="meta">{{ page.date | date: "%B %d, %Y" }} &nbsp;&middot;&nbsp; {{ page.author }}</div>
{% if page.description %}<p class="lead">{{ page.description }}</p><hr>{% endif %}
{{ content }}
<br><br>
<a class="back" href="{{ site.baseurl }}/">&larr; Back to all stories</a>
</body>
</html>
