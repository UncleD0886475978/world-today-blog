<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }} | The World Today</title>
</head>
<body style="font-family: Georgia, serif; max-width: 800px; margin: 40px auto; padding: 0 20px; line-height: 1.7;">
<a href="{{ site.baseurl }}/" style="color: #c0392b; font-size: 0.85rem; text-decoration: none;">← Back to The World Today</a>
<h1 style="font-size: 2rem; margin: 20px 0 10px;">{{ page.title }}</h1>
<p style="color: #888; font-size: 0.85rem;">{{ page.date | date: "%B %d, %Y" }} &nbsp;|&nbsp; {{ page.categories | join: ", " }}</p>
<hr style="border: 1px solid #ddd; margin: 20px 0;">
{{ content }}
</body>
</html>
